<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#a10f0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>{{ title }} · LiturgyFlow</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --ink: #15333d;
      --muted: #5c6b75;
      --accent: #a10f0d;
      --card: #ffffff;
      --line: #e2e8f0;
      --lyrics-size: clamp(1.0625rem, 4.2vw, 1.1875rem);
      --lyrics-leading: 1.7;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    html, body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-x: clip;
    }
    .practice-frame {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    .practice-top {
      flex: 0 0 auto;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }
    .practice-top__eyebrow {
      margin: 0 0 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .practice-top h1 {
      margin: 0 0 6px;
      font-size: clamp(1.125rem, 4.5vw, 1.35rem);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    .practice-top p {
      margin: 0;
      font-size: 0.8125rem;
      line-height: 1.45;
      color: var(--muted);
    }
    .practice-tabs {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .practice-tabs::-webkit-scrollbar { display: none; }
    .practice-tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      min-height: 40px;
    }
    .practice-tab.is-active {
      background: color-mix(in srgb, var(--accent) 10%, white);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
      color: var(--accent);
    }
    .practice-scroll {
      flex: 1 1 auto;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(20px + var(--safe-bottom));
    }
    .practice-song-head {
      margin-bottom: 14px;
    }
    .practice-song-head__slot {
      margin: 0 0 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .practice-song-head h2 {
      margin: 0 0 4px;
      font-size: clamp(1.25rem, 5vw, 1.5rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .practice-song-head__meta {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .practice-lyrics {
      margin: 0;
      padding: 0;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.15rem;
    }
    .practice-lyric-block {
      margin: 0;
      padding: 0;
    }
    .practice-lyric-block__label {
      margin: 0 0 6px;
      font-size: calc(var(--lyrics-size) * 0.78);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.3;
      color: var(--block-accent, var(--accent));
    }
    .practice-lyric-block__body {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: var(--lyrics-size);
      line-height: var(--lyrics-leading);
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-transform: none;
    }
    .practice-lyric-block--verse { --block-accent: #a10f0d; }
    .practice-lyric-block--chorus,
    .practice-lyric-block--refrain { --block-accent: #c9a227; }
    .practice-lyric-block--bridge { --block-accent: #b45309; }
    .practice-lyric-block--response { --block-accent: #5b21b6; }
    .practice-lyric-block--stanza { --block-accent: #1d4ed8; }
    .practice-lyric-block--intro,
    .practice-lyric-block--coda,
    .practice-lyric-block--vamp { --block-accent: #475569; }
    .practice-pin-wrap {
      padding: 24px 16px;
    }
    .practice-pin {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }
    .practice-pin label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .practice-pin-entry {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .pin-otp__wrap {
      position: relative;
      cursor: text;
    }
    .pin-otp__trap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      border: 0;
      padding: 0;
      margin: 0;
      z-index: 2;
      caret-color: transparent;
    }
    .pin-otp__cells {
      display: flex;
      gap: 10px;
      justify-content: center;
      pointer-events: none;
    }
    .pin-otp__box {
      width: 3.25rem;
      height: 3.5rem;
      flex: 0 0 auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card);
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 3.5rem;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pin-otp__box.is-active {
      outline: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
    }
    .practice-pin-submit {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
    }
    .practice-pin-error {
      margin: 10px 0 0;
      font-size: 0.8125rem;
      color: #9b3d4e;
    }
    .practice-status {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    .practice-status.error { color: #9b3d4e; }
    .practice-footnote {
      flex: 0 0 auto;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0 16px 10px;
    }
    @media (min-width: 1024px) and (hover: hover) {
      body {
        align-items: center;
        background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 120px);
      }
      .practice-frame {
        max-width: 480px;
        box-shadow: 0 0 0 1px var(--line);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="practice-frame">
    <header class="practice-top" id="practice-top" hidden>
      <p class="practice-top__eyebrow">Choir practice</p>
      <h1 id="practice-title">Upcoming Mass</h1>
      <p id="practice-sub"></p>
    </header>

    <nav class="practice-tabs" id="practice-tabs" hidden aria-label="Songs"></nav>

    <main class="practice-scroll" id="practice-scroll">
      <div id="practice-root">
        <p class="practice-status" id="practice-loading">Loading practice set…</p>
      </div>
    </main>

    <p class="practice-footnote" id="practice-footnote" hidden>Read-only lyrics · frozen at share time</p>
  </div>

  <script>
    (function () {
      const token = {{ token|tojson }};
      const root = document.getElementById("practice-root");
      const scroll = document.getElementById("practice-scroll");
      const top = document.getElementById("practice-top");
      const tabs = document.getElementById("practice-tabs");
      const footnote = document.getElementById("practice-footnote");
      let state = { songs: [], index: 0 };

      const fetchOpts = { credentials: "same-origin" };

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso + "T12:00:00");
          return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
        } catch (_e) {
          return iso;
        }
      }

      function mountPinOtp(container) {
        if (!container) return { getValue: function () { return ""; }, focus: function () {}, clear: function () {} };
        const trap = container.querySelector(".pin-otp__trap");
        const boxes = Array.prototype.slice.call(container.querySelectorAll("[data-pin-box]"));
        const limit = boxes.length || 6;
        if (!trap) return { getValue: function () { return ""; }, focus: function () {}, clear: function () {} };
        let revealIndex = -1;
        let revealTimer = null;
        let lastLen = 0;

        function clearRevealTimer() {
          if (revealTimer) {
            clearTimeout(revealTimer);
            revealTimer = null;
          }
        }

        function scheduleMask(index) {
          clearRevealTimer();
          revealIndex = index;
          revealTimer = setTimeout(function () {
            revealIndex = -1;
            revealTimer = null;
            sync();
          }, 700);
        }

        function sync() {
          const val = (trap.value || "").replace(/\D/g, "").slice(0, limit);
          if (trap.value !== val) trap.value = val;
          const lastFilled = val.length - 1;
          boxes.forEach(function (box, i) {
            const filled = i < val.length;
            if (!filled) {
              box.textContent = "";
            } else if (i === revealIndex) {
              box.textContent = val.charAt(i);
            } else {
              box.textContent = "\u2022";
            }
            box.classList.toggle("is-filled", filled);
            box.classList.toggle("is-active", filled && i === lastFilled);
          });
          lastLen = val.length;
        }

        function appendDigit(digit) {
          const prev = (trap.value || "").replace(/\D/g, "");
          if (prev.length >= limit) return;
          const val = (prev + digit).slice(0, limit);
          trap.value = val;
          scheduleMask(val.length - 1);
          sync();
        }

        trap.addEventListener("input", function () {
          const val = (trap.value || "").replace(/\D/g, "").slice(0, limit);
          if (trap.value !== val) trap.value = val;
          if (val.length > lastLen) {
            scheduleMask(val.length - 1);
          } else if (val.length < lastLen) {
            clearRevealTimer();
            revealIndex = -1;
          }
          sync();
        });
        trap.addEventListener("paste", function (ev) {
          ev.preventDefault();
          const text = (ev.clipboardData && ev.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0, limit);
          trap.value = text;
          if (text.length) scheduleMask(text.length - 1);
          else {
            clearRevealTimer();
            revealIndex = -1;
          }
          sync();
        });
        container.addEventListener("click", function () { trap.focus(); });

        function onDocKey(ev) {
          if (!container.isConnected) {
            document.removeEventListener("keydown", onDocKey, true);
            return;
          }
          const t = ev.target;
          if (t && t !== trap && (t.tagName === "TEXTAREA" || t.tagName === "INPUT" || t.tagName === "SELECT")) return;
          if (/^\d$/.test(ev.key)) {
            ev.preventDefault();
            trap.focus();
            appendDigit(ev.key);
          } else if (ev.key === "Backspace") {
            const val = (trap.value || "").replace(/\D/g, "");
            if (document.activeElement !== trap || val.length) {
              ev.preventDefault();
              trap.focus();
              clearRevealTimer();
              revealIndex = -1;
              trap.value = val.slice(0, -1);
              sync();
            }
          }
        }
        document.addEventListener("keydown", onDocKey, true);

        sync();
        requestAnimationFrame(function () { trap.focus({ preventScroll: true }); });

        return {
          getValue: function () { return (trap.value || "").replace(/\D/g, "").slice(0, limit); },
          clear: function () {
            clearRevealTimer();
            revealIndex = -1;
            trap.value = "";
            sync();
            trap.focus();
          },
          focus: function () { trap.focus(); },
          destroy: function () {
            clearRevealTimer();
            document.removeEventListener("keydown", onDocKey, true);
          },
          cells: boxes,
        };
      }

      function pinOtpMarkup() {
        const boxes = [1, 2, 3, 4, 5, 6].map(function () {
          return '<span class="pin-otp__box" data-pin-box aria-hidden="true"></span>';
        }).join("");
        return '<input type="tel" class="pin-otp__trap" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" aria-labelledby="practice-pin-label" />' +
          '<div class="pin-otp__cells" aria-hidden="true">' + boxes + '</div>';
      }

      function renderPinForm(errorMsg) {
        top.hidden = true;
        tabs.hidden = true;
        footnote.hidden = true;
        root.innerHTML =
          '<div class="practice-pin-wrap">' +
            '<section class="practice-pin" aria-labelledby="practice-pin-label">' +
              '<label id="practice-pin-label">Enter the 6-digit PIN from your choir leader</label>' +
              '<p class="muted" style="margin:0 0 12px;font-size:0.8125rem;line-height:1.45;">The PIN is not included in the link — share it separately (e.g. in person or by text).</p>' +
              '<div class="practice-pin-entry">' +
                '<div class="pin-otp__wrap" id="practice-pin-otp" role="group" aria-labelledby="practice-pin-label">' +
                  pinOtpMarkup() +
                '</div>' +
                '<button type="button" class="practice-pin-submit" id="practice-pin-submit">Unlock</button>' +
              '</div>' +
              (errorMsg ? '<p class="practice-pin-error" role="alert">' + esc(errorMsg) + '</p>' : '') +
            '</section>' +
          '</div>';
        const otp = mountPinOtp(document.getElementById("practice-pin-otp"));
        const btn = document.getElementById("practice-pin-submit");
        btn.addEventListener("click", function () {
          submitPin(otp.getValue());
        });
        const trapEnter = document.querySelector("#practice-pin-otp .pin-otp__trap");
        if (trapEnter) {
          trapEnter.addEventListener("keydown", function (ev) {
            if (ev.key === "Enter") btn.click();
          });
        }
        otp.focus();
      }

      async function submitPin(pin) {
        if (pin.length !== 6) {
          renderPinForm("Enter the full 6-digit PIN.");
          return;
        }
        root.innerHTML = '<p class="practice-status">Checking PIN…</p>';
        try {
          const res = await fetch("/api/practice/" + encodeURIComponent(token) + "/unlock", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pin: pin }),
          });
          const data = await res.json().catch(function () { return {}; });
          if (res.status === 429) {
            renderPinForm(data.detail || "Too many attempts. Wait a few minutes and try again.");
            return;
          }
          if (!res.ok) {
            renderPinForm(data.error || data.detail || "Incorrect PIN.");
            return;
          }
          renderPractice(data);
        } catch (_err) {
          renderPinForm("Could not verify PIN. Check your connection.");
        }
      }

      function renderPractice(data) {
        const songs = Array.isArray(data.songs) ? data.songs : [];
        state.songs = songs;
        if (!songs.length) {
          top.hidden = true;
          tabs.hidden = true;
          footnote.hidden = true;
          root.innerHTML = '<p class="practice-status error">No songs in this practice link.</p>';
          return;
        }

        const bits = [];
        if (data.parish_name) bits.push(esc(data.parish_name));
        if (data.mass_date) bits.push(formatDate(data.mass_date));
        if (data.celebrant) bits.push(esc(data.celebrant));

        document.getElementById("practice-title").textContent = data.mass_title || "Upcoming Mass";
        document.getElementById("practice-sub").textContent = bits.join(" · ");
        top.hidden = false;
        footnote.hidden = false;

        tabs.innerHTML = "";
        tabs.hidden = songs.length < 2;
        songs.forEach(function (song, i) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "practice-tab" + (i === state.index ? " is-active" : "");
          btn.textContent = song.slot_label || song.title || ("Song " + (i + 1));
          btn.addEventListener("click", function () {
            state.index = i;
            renderCurrentSong();
            scroll.scrollTop = 0;
          });
          tabs.appendChild(btn);
        });

        renderCurrentSong();
      }

      function capitalizeFirstAlpha(token) {
        const s = String(token || "");
        if (!s) return s;
        for (let i = 0; i < s.length; i += 1) {
          const ch = s.charAt(i);
          if (/[A-Za-z\u00C0-\u024F]/.test(ch)) {
            return s.slice(0, i) + ch.toUpperCase() + s.slice(i + 1);
          }
        }
        return s;
      }

      function formatLyricsFirstLetters(raw) {
        const text = String(raw || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        if (!text.trim()) return text.trim();
        return text.split("\n").map(function (line) {
          if (!line.trim()) return "";
          const leadMatch = line.match(/^[ \t]*/);
          const lead = leadMatch ? leadMatch[0] : "";
          const body = line.slice(lead.length);
          return lead + body.split(" ").map(capitalizeFirstAlpha).join(" ");
        }).join("\n").trim();
      }

      const STRUCTURE_LABEL_RE = /^\s*\[?\s*(refrain|verse|chorus|stanza|bridge|response|coda|intro|vamp)(\s*[\w\d]*)?\s*\]?\s*[:.)-]?\s*$/i;
      const STRUCTURE_INLINE_RE = /^\s*(refrain|verse|chorus|bridge|response|stanza|coda|intro|vamp)\s*:\s*(.*)$/i;

      function structureKindFromLabel(line) {
        const m = String(line || "").trim().match(STRUCTURE_LABEL_RE);
        if (m) {
          const kind = String(m[1] || "").toLowerCase();
          return kind === "refrain" ? "chorus" : kind;
        }
        const inline = String(line || "").trim().match(STRUCTURE_INLINE_RE);
        if (inline) {
          const kind = String(inline[1] || "").toLowerCase();
          return kind === "refrain" ? "chorus" : kind;
        }
        return "";
      }

      function cleanStructureLabel(line) {
        return String(line || "")
          .trim()
          .replace(/^\[|\]$/g, "")
          .replace(/[:.)-]+\s*$/, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function ensureLyricSectionBreaks(lyrics) {
        const lines = String(lyrics || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        const out = [];
        lines.forEach(function (line) {
          const stripped = line.trim();
          if (stripped && out.length && out[out.length - 1] !== "" && STRUCTURE_LABEL_RE.test(stripped)) {
            out.push("");
          }
          out.push(line.replace(/\s+$/, ""));
        });
        return out.join("\n").trim();
      }

      function parseLyricSections(raw) {
        const text = ensureLyricSectionBreaks(raw);
        if (!text) return [];
        const chunks = text.split(/\n\s*\n+/);
        const sections = [];
        chunks.forEach(function (part) {
          const lines = part.split("\n").map(function (ln) { return ln.trim(); }).filter(Boolean);
          if (!lines.length) return;
          const first = lines[0];
          let kind = "verse";
          let label = "Verse";
          let bodyLines = lines;
          const headerKind = structureKindFromLabel(first);
          if (headerKind) {
            kind = headerKind;
            label = cleanStructureLabel(first) || kind;
            bodyLines = lines.slice(1);
          } else {
            const inline = first.match(STRUCTURE_INLINE_RE);
            if (inline) {
              kind = structureKindFromLabel(first) || "verse";
              label = String(inline[1] || kind).trim();
              const remainder = String(inline[2] || "").trim();
              bodyLines = (remainder ? [remainder] : []).concat(lines.slice(1));
            }
          }
          bodyLines = bodyLines.filter(function (ln) { return !STRUCTURE_LABEL_RE.test(ln); });
          const body = bodyLines.join("\n").trim();
          if (!body) return;
          sections.push({ kind: kind, label: label, body: body });
        });
        if (!sections.length && text.trim()) {
          sections.push({ kind: "verse", label: "Lyrics", body: text.trim() });
        }
        return sections;
      }

      function renderPracticeLyrics(raw) {
        const sections = parseLyricSections(raw);
        if (!sections.length) {
          return '<p class="practice-status">No lyrics for this song.</p>';
        }
        return '<div class="practice-lyrics">' + sections.map(function (sec) {
          const kind = esc(sec.kind || "verse");
          const label = esc(sec.label || "Verse");
          const body = esc(formatLyricsFirstLetters(sec.body || ""));
          return (
            '<section class="practice-lyric-block practice-lyric-block--' + kind + '">' +
              '<p class="practice-lyric-block__label">' + label + '</p>' +
              '<pre class="practice-lyric-block__body">' + body + '</pre>' +
            '</section>'
          );
        }).join("") + '</div>';
      }

      function renderCurrentSong() {
        const song = state.songs[state.index];
        if (!song) return;
        const meta = [song.author, song.language].filter(Boolean).join(" · ");
        root.innerHTML =
          '<div class="practice-song-head">' +
            '<p class="practice-song-head__slot">' + esc(song.slot_label || "Song") + '</p>' +
            '<h2>' + esc(song.title || "Untitled") + '</h2>' +
            (meta ? '<p class="practice-song-head__meta">' + esc(meta) + '</p>' : '') +
          '</div>' +
          renderPracticeLyrics(song.lyrics || "");

        document.querySelectorAll(".practice-tab").forEach(function (el, i) {
          el.classList.toggle("is-active", i === state.index);
          if (i === state.index) el.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
        });
      }

      async function loadPractice() {
        root.innerHTML = '<p class="practice-status">Loading practice set…</p>';
        top.hidden = true;
        tabs.hidden = true;
        footnote.hidden = true;
        try {
          const res = await fetch("/api/practice/" + encodeURIComponent(token), fetchOpts);
          const data = await res.json().catch(function () { return {}; });
          if (res.status === 429) {
            root.innerHTML = '<p class="practice-status error">' + esc(data.detail || "Too many requests. Please try again shortly.") + '</p>';
            return;
          }
          if (!res.ok) {
            root.innerHTML = '<p class="practice-status error">' + esc(data.detail || "This link is invalid or expired.") + '</p>';
            return;
          }
          if (data.requires_pin) {
            renderPinForm();
            return;
          }
          renderPractice(data);
        } catch (_err) {
          root.innerHTML = '<p class="practice-status error">Could not load practice lyrics. Check your connection.</p>';
        }
      }

      if (!token) {
        root.innerHTML = '<p class="practice-status error">Missing practice link.</p>';
        return;
      }
      loadPractice();
    })();
  </script>
</body>
</html>
