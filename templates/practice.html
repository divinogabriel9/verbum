<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#a10f0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>{{ title }} · LiturgyFlow</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --ink: #15333d;
      --muted: #5c6b75;
      --accent: #a10f0d;
      --card: #ffffff;
      --line: #e2e8f0;
      --lyrics-size: clamp(1.0625rem, 4.2vw, 1.1875rem);
      --lyrics-leading: 1.7;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --dock-h: 64px;
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    html, body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-x: clip;
    }
    .practice-frame {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    .practice-top {
      flex: 0 0 auto;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }
    .practice-top__eyebrow {
      margin: 0 0 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .practice-top h1 {
      margin: 0 0 6px;
      font-size: clamp(1.125rem, 4.5vw, 1.35rem);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    .practice-top p {
      margin: 0;
      font-size: 0.8125rem;
      line-height: 1.45;
      color: var(--muted);
    }
    .practice-tabs {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .practice-tabs::-webkit-scrollbar { display: none; }
    .practice-tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      min-height: 40px;
    }
    .practice-tab.is-active {
      background: color-mix(in srgb, var(--accent) 10%, white);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
      color: var(--accent);
    }
    .practice-scroll {
      flex: 1 1 auto;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--dock-h) + var(--safe-bottom) + 20px);
    }
    .practice-song-head {
      margin-bottom: 14px;
    }
    .practice-song-head__slot {
      margin: 0 0 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .practice-song-head h2 {
      margin: 0 0 4px;
      font-size: clamp(1.25rem, 5vw, 1.5rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .practice-song-head__meta {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .practice-lyrics {
      margin: 0;
      padding: 0;
      max-width: 100%;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: var(--lyrics-size);
      line-height: var(--lyrics-leading);
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-transform: none;
    }
    .practice-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      gap: 10px;
      padding: 10px 16px calc(10px + var(--safe-bottom));
      background: color-mix(in srgb, var(--card) 94%, transparent);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .practice-dock button {
      flex: 1;
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .practice-dock button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .practice-pin-wrap {
      padding: 24px 16px;
    }
    .practice-pin {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }
    .practice-pin label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .practice-pin-entry {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .pin-otp__cells {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .pin-otp__cell {
      width: 3.25rem;
      height: 3.5rem;
      flex: 0 0 auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card);
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 0;
      color: var(--ink);
      -moz-appearance: textfield;
    }
    .pin-otp__cell::-webkit-outer-spin-button,
    .pin-otp__cell::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .pin-otp__cell:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
    }
    .practice-pin-submit {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
    }
    .practice-pin-error {
      margin: 10px 0 0;
      font-size: 0.8125rem;
      color: #9b3d4e;
    }
    .practice-status {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    .practice-status.error { color: #9b3d4e; }
    .practice-footnote {
      flex: 0 0 auto;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0 16px 10px;
    }
    @media (min-width: 1024px) and (hover: hover) {
      body {
        align-items: center;
        background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 120px);
      }
      .practice-frame {
        max-width: 480px;
        box-shadow: 0 0 0 1px var(--line);
      }
      .practice-dock {
        max-width: 480px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 16px 16px 0 0;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="practice-frame">
    <header class="practice-top" id="practice-top" hidden>
      <p class="practice-top__eyebrow">Choir practice</p>
      <h1 id="practice-title">Upcoming Mass</h1>
      <p id="practice-sub"></p>
    </header>

    <nav class="practice-tabs" id="practice-tabs" hidden aria-label="Songs"></nav>

    <main class="practice-scroll" id="practice-scroll">
      <div id="practice-root">
        <p class="practice-status" id="practice-loading">Loading practice set…</p>
      </div>
    </main>

    <p class="practice-footnote" id="practice-footnote" hidden>Read-only lyrics · frozen at share time</p>

    <footer class="practice-dock" id="practice-dock" hidden>
      <button type="button" id="practice-prev">Previous</button>
      <button type="button" id="practice-next">Next</button>
    </footer>
  </div>

  <script>
    (function () {
      const token = {{ token|tojson }};
      const root = document.getElementById("practice-root");
      const scroll = document.getElementById("practice-scroll");
      const top = document.getElementById("practice-top");
      const tabs = document.getElementById("practice-tabs");
      const dock = document.getElementById("practice-dock");
      const footnote = document.getElementById("practice-footnote");
      let state = { songs: [], index: 0 };

      const fetchOpts = { credentials: "same-origin" };

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso + "T12:00:00");
          return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
        } catch (_e) {
          return iso;
        }
      }

      function mountPinOtp(container) {
        if (!container) return { getValue: function () { return ""; }, focus: function () {} };
        const cells = Array.prototype.slice.call(container.querySelectorAll("[data-pin-cell]"));
        function getValue() {
          return cells.map(function (c) { return (c.value || "").replace(/\D/g, "").slice(0, 1); }).join("");
        }
        function focus() {
          if (cells[0]) cells[0].focus();
        }
        cells.forEach(function (cell, i) {
          cell.addEventListener("input", function () {
            const v = (cell.value || "").replace(/\D/g, "");
            cell.value = v.slice(-1);
            if (cell.value && i < cells.length - 1) cells[i + 1].focus();
          });
          cell.addEventListener("keydown", function (ev) {
            if (ev.key === "Backspace" && !cell.value && i > 0) {
              cells[i - 1].focus();
              cells[i - 1].value = "";
              ev.preventDefault();
            }
            if (ev.key === "ArrowLeft" && i > 0) cells[i - 1].focus();
            if (ev.key === "ArrowRight" && i < cells.length - 1) cells[i + 1].focus();
          });
          cell.addEventListener("paste", function (ev) {
            ev.preventDefault();
            const text = (ev.clipboardData && ev.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0, cells.length);
            text.split("").forEach(function (ch, j) {
              if (cells[j]) cells[j].value = ch;
            });
            const next = Math.min(text.length, cells.length - 1);
            if (cells[next]) cells[next].focus();
          });
        });
        return { getValue: getValue, focus: focus, cells: cells };
      }

      function pinOtpMarkup() {
        return [1, 2, 3, 4].map(function (n) {
          return '<input type="password" inputmode="numeric" maxlength="1" class="pin-otp__cell" data-pin-cell autocomplete="one-time-code" aria-label="Digit ' + n + '" />';
        }).join("");
      }

      function renderPinForm(errorMsg) {
        top.hidden = true;
        tabs.hidden = true;
        dock.hidden = true;
        footnote.hidden = true;
        root.innerHTML =
          '<div class="practice-pin-wrap">' +
            '<section class="practice-pin" aria-labelledby="practice-pin-label">' +
              '<label id="practice-pin-label">Enter the 4-digit PIN from your choir leader</label>' +
              '<p class="muted" style="margin:0 0 12px;font-size:0.8125rem;line-height:1.45;">The PIN is not included in the link — share it separately (e.g. in person or by text).</p>' +
              '<div class="practice-pin-entry">' +
                '<div class="pin-otp__cells" id="practice-pin-otp" role="group" aria-labelledby="practice-pin-label">' +
                  pinOtpMarkup() +
                '</div>' +
                '<button type="button" class="practice-pin-submit" id="practice-pin-submit">Unlock</button>' +
              '</div>' +
              (errorMsg ? '<p class="practice-pin-error" role="alert">' + esc(errorMsg) + '</p>' : '') +
            '</section>' +
          '</div>';
        const otp = mountPinOtp(document.getElementById("practice-pin-otp"));
        const btn = document.getElementById("practice-pin-submit");
        btn.addEventListener("click", function () {
          submitPin(otp.getValue());
        });
        otp.cells.forEach(function (cell) {
          cell.addEventListener("keydown", function (ev) {
            if (ev.key === "Enter") btn.click();
          });
        });
        otp.focus();
      }

      async function submitPin(pin) {
        if (pin.length !== 4) {
          renderPinForm("Enter the full 4-digit PIN.");
          return;
        }
        root.innerHTML = '<p class="practice-status">Checking PIN…</p>';
        try {
          const res = await fetch("/api/practice/" + encodeURIComponent(token) + "/unlock", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pin: pin }),
          });
          const data = await res.json().catch(function () { return {}; });
          if (res.status === 429) {
            renderPinForm(data.detail || "Too many attempts. Wait a few minutes and try again.");
            return;
          }
          if (!res.ok) {
            renderPinForm(data.error || data.detail || "Incorrect PIN.");
            return;
          }
          renderPractice(data);
        } catch (_err) {
          renderPinForm("Could not verify PIN. Check your connection.");
        }
      }

      function renderPractice(data) {
        const songs = Array.isArray(data.songs) ? data.songs : [];
        state.songs = songs;
        if (!songs.length) {
          top.hidden = true;
          tabs.hidden = true;
          dock.hidden = true;
          footnote.hidden = true;
          root.innerHTML = '<p class="practice-status error">No songs in this practice link.</p>';
          return;
        }

        const bits = [];
        if (data.parish_name) bits.push(esc(data.parish_name));
        if (data.mass_date) bits.push(formatDate(data.mass_date));
        if (data.celebrant) bits.push(esc(data.celebrant));

        document.getElementById("practice-title").textContent = data.mass_title || "Upcoming Mass";
        document.getElementById("practice-sub").textContent = bits.join(" · ");
        top.hidden = false;
        footnote.hidden = false;

        tabs.innerHTML = "";
        tabs.hidden = songs.length < 2;
        songs.forEach(function (song, i) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "practice-tab" + (i === state.index ? " is-active" : "");
          btn.textContent = song.slot_label || song.title || ("Song " + (i + 1));
          btn.addEventListener("click", function () {
            state.index = i;
            renderCurrentSong();
            scroll.scrollTop = 0;
          });
          tabs.appendChild(btn);
        });

        dock.hidden = false;
        document.getElementById("practice-prev").onclick = function () {
          if (state.index > 0) {
            state.index -= 1;
            renderCurrentSong();
            scroll.scrollTop = 0;
          }
        };
        document.getElementById("practice-next").onclick = function () {
          if (state.index < songs.length - 1) {
            state.index += 1;
            renderCurrentSong();
            scroll.scrollTop = 0;
          }
        };
        renderCurrentSong();
      }

      function renderCurrentSong() {
        const song = state.songs[state.index];
        if (!song) return;
        const meta = [song.author, song.language].filter(Boolean).join(" · ");
        root.innerHTML =
          '<div class="practice-song-head">' +
            '<p class="practice-song-head__slot">' + esc(song.slot_label || "Song") + '</p>' +
            '<h2>' + esc(song.title || "Untitled") + '</h2>' +
            (meta ? '<p class="practice-song-head__meta">' + esc(meta) + '</p>' : '') +
          '</div>' +
          '<pre class="practice-lyrics">' + esc(song.lyrics || "") + '</pre>';

        document.querySelectorAll(".practice-tab").forEach(function (el, i) {
          el.classList.toggle("is-active", i === state.index);
          if (i === state.index) el.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
        });
        const prev = document.getElementById("practice-prev");
        const next = document.getElementById("practice-next");
        if (prev) prev.disabled = state.index <= 0;
        if (next) next.disabled = state.index >= state.songs.length - 1;
      }

      async function loadPractice() {
        root.innerHTML = '<p class="practice-status">Loading practice set…</p>';
        top.hidden = true;
        tabs.hidden = true;
        dock.hidden = true;
        footnote.hidden = true;
        try {
          const res = await fetch("/api/practice/" + encodeURIComponent(token), fetchOpts);
          const data = await res.json().catch(function () { return {}; });
          if (res.status === 429) {
            root.innerHTML = '<p class="practice-status error">' + esc(data.detail || "Too many requests. Please try again shortly.") + '</p>';
            return;
          }
          if (!res.ok) {
            root.innerHTML = '<p class="practice-status error">' + esc(data.detail || "This link is invalid or expired.") + '</p>';
            return;
          }
          if (data.requires_pin) {
            renderPinForm();
            return;
          }
          renderPractice(data);
        } catch (_err) {
          root.innerHTML = '<p class="practice-status error">Could not load practice lyrics. Check your connection.</p>';
        }
      }

      if (!token) {
        root.innerHTML = '<p class="practice-status error">Missing practice link.</p>';
        return;
      }
      loadPractice();
    })();
  </script>
</body>
</html>
